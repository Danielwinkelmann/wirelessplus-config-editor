<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spromise :: config editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <span class="brand">spromise</span>
  <span class="sep hide-sm">:</span>
  <span class="meta hide-sm">config editor v0.1</span>
  <span class="sep hide-sm">·</span>
  <span class="meta hide-sm">WirelessPlus 0.5 compatible</span>
  <span class="spacer"></span>
  <label class="toggle" title="zeige auch inferred/guess Felder">
    <input type="checkbox" id="showAllToggle">
    <span class="track"></span>
    <span class="lbl">show all</span>
  </label>
  <span class="sep">·</span>
  <span class="info" id="info">—</span>
</header>

<main>
  <div id="status" class="status"></div>

  <div class="actions">
    <label class="btn">
      <input type="file" id="fileInput" accept=".cfg,.bin,.CFG,.BIN">
      load file…
    </label>
    <button id="newBinBtn">new MMSCFG.BIN</button>
    <button id="newCfgBtn">new wireless.cfg</button>
    <span style="flex:1"></span>
    <button id="saveBtn" class="primary" disabled>save ▸</button>
  </div>

  <div id="app"></div>

  <div class="card" id="rawBytesCard" hidden>
    <header class="card-hd"><h2>Raw bytes</h2><span class="range" id="hex-range">—</span></header>
    <div class="body">
      <div class="hint">Bytes, die nicht von den Feldern oben abgedeckt sind, bleiben beim Speichern unverändert. Blau = gegenüber Original veränderte Bytes.</div>
      <details>
        <summary>Hex-Ansicht anzeigen</summary>
        <div class="hex-view" id="hexView"></div>
      </details>
    </div>
  </div>

  <footer>single-file editor · no data leaves your device · <span style="color:var(--text-dim)">built offline</span></footer>
</main>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
